---
# Post-configuration tasks (run at the very end)

- name: Check if bat is installed
  ansible.builtin.command: which bat
  environment:
    PATH: "{{ ansible_path }}"
  register: bat_check
  failed_when: false
  changed_when: false

- name: Build bat cache
  ansible.builtin.command: bat cache --build
  environment:
    PATH: "{{ ansible_path }}"
  when: bat_check.rc == 0
  register: bat_cache_result
  failed_when: false
  changed_when: false

- name: Check if update-alternatives exists
  ansible.builtin.command: which update-alternatives
  register: update_alternatives_check
  failed_when: false
  changed_when: false

- name: Check if neovim is installed
  ansible.builtin.command: which nvim
  environment:
    PATH: "{{ ansible_path }}"
  register: nvim_check
  failed_when: false
  changed_when: false

- name: Set neovim as default editor (if update-alternatives exists)
  environment:
    PATH: "{{ ansible_path }}"
  when:
    - update_alternatives_check.rc == 0
    - nvim_check.rc == 0
  block:
    - name: Check current editor alternative
      ansible.builtin.shell: readlink -f /etc/alternatives/editor 2>/dev/null || echo "none"
      register: current_editor
      changed_when: false

    - name: Install neovim as editor alternative
      ansible.builtin.command: update-alternatives --install /usr/bin/editor editor "{{ nvim_check.stdout }}" 1
      when: "'nvim' not in current_editor.stdout"
      changed_when: true
      become: true

    - name: Set neovim as default editor
      ansible.builtin.command: update-alternatives --set editor "{{ nvim_check.stdout }}"
      when: "'nvim' not in current_editor.stdout"
      changed_when: true
      become: true

- name: Check if systemd is available
  ansible.builtin.command: systemctl --version
  register: systemd_check
  failed_when: false
  changed_when: false

- name: Check if systemd user services are available
  when: systemd_check.rc == 0
  block:
    - name: Probe systemd user instance
      ansible.builtin.systemd:
        name: default.target
        scope: user
        state: started
      check_mode: true
      register: systemd_user_check
      changed_when: false

    - name: Mark systemd user services available
      ansible.builtin.set_fact:
        systemd_user_available: true
  rescue:
    - name: Mark systemd user services unavailable
      ansible.builtin.set_fact:
        systemd_user_available: false

- name: Check if WSL 1Password SSH agent bridge service exists
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.config/systemd/user/1password-ssh-agent.service"
  register: onepassword_ssh_agent_service_check
  when:
    - systemd_user_available | default(false)
    - is_wsl | default(false)

- name: Reload systemd user daemon for WSL SSH agent bridge
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  when:
    - systemd_user_available | default(false)
    - is_wsl | default(false)
    - onepassword_ssh_agent_service_check.stat.exists | default(false)

- name: Enable WSL 1Password SSH agent bridge service
  ansible.builtin.systemd:
    name: 1password-ssh-agent.service
    enabled: true
    state: started
    scope: user
  when:
    - systemd_user_available | default(false)
    - is_wsl | default(false)
    - onepassword_ssh_agent_service_check.stat.exists | default(false)

- name: Check if ghostty service exists
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.config/systemd/user/app-com.mitchellh.ghostty.service"
  register: ghostty_service_check
  when:
    - systemd_user_available | default(false)
    - not (is_wsl | default(false))

- name: Enable ghostty systemd service (if systemctl available)
  ansible.builtin.systemd:
    name: app-com.mitchellh.ghostty.service
    enabled: true
    scope: user
  when:
    - systemd_user_available | default(false)
    - not (is_wsl | default(false))
    - ghostty_service_check.stat.exists | default(false)

- name: Warn if systemd user services are unavailable
  ansible.builtin.debug:
    msg: "systemd user services are not available. User services managed via chezmoi were not enabled."
  when:
    - systemd_check.rc == 0
    - not (systemd_user_available | default(false))

# IMPORTANT: Unlink Python at the very end to avoid breaking dependencies during installation
- name: Check if Python is linked in Homebrew
  ansible.builtin.command: "{{ brew_bin }} list python"
  environment:
    PATH: "{{ ansible_path }}"
  register: python_linked_check
  failed_when: false
  changed_when: false

- name: Unlink Python from Homebrew (prevents conflicts with system Python)
  ansible.builtin.command: "{{ brew_bin }} unlink python"
  environment:
    PATH: "{{ ansible_path }}"
  when: python_linked_check.rc == 0
  register: python_unlink_result
  failed_when: false
  changed_when: python_unlink_result.stdout is not search('0 symlinks removed')

- name: Display final message
  ansible.builtin.debug:
    msg: |
      Bootstrap complete!

      IMPORTANT: You should now:
      1. Log out and log back in (or open a new terminal)
      2. Chezmoi-managed configuration has been applied
      3. Homebrew Python has been unlinked to prevent conflicts

      To switch to fish shell (if installed):
      chsh -s $(which fish)
